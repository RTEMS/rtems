actions:
- action: remove-glob
  enabled-by: true
  path: ${.:/params/working-directory}
  patterns:
  - build
  - .lock-waf*
  - .waf*
  remove-tree: true
- action: subprocess
  command:
  - ./waf
  - configure
  - --prefix=${.:/component/deployment-directory}
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/working-directory}
- action: subprocess
  command:
  - ./waf
  - build
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/working-directory}
- action: subprocess
  command:
  - ./waf
  - install
  - --destdir=${.:/params/intermediate-directory}
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/working-directory}
- action: directory-state-discard-and-clear
  enabled-by: true
  output-name: .
- action: directory-state-move-tree
  enabled-by: true
  excludes: []
  output-name: .
  prefix: null
  root: ${.:/params/intermediate-directory}/${.:/component/deployment-directory}
- action: remove-glob
  enabled-by: true
  path: ${.:/params/working-directory}
  patterns:
  - build
  - .lock-waf*
  - .waf*
  remove-tree: true
