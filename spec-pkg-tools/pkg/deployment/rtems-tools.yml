directory: ${.:/component/deployment-directory}
directory-state-type: explicit
enabled-by: true
files: []
hash: null
links:
- hash: null
  name: component
  role: input
  uid: ../component
- hash: null
  name: source
  role: input
  uid: ../source/rtems-tools
- hash: null
  name: member
  role: input-to
  uid: archive
params:
  intermediate-directory: ${.:/params/working-directory}/destdir
  working-directory: ${../source/rtems-tools:/directory}
pkg-type: directory-state
type: pkg
