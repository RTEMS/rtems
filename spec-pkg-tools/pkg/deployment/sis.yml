actions:
- action: remove-tree
  enabled-by: true
  missing-ok: true
  path: ${.:/params/build-directory}
- action: mkdir
  enabled-by: true
  exist-ok: false
  parents: true
  path: ${.:/params/build-directory}
- action: subprocess
  command:
  - ${../source/sis:/directory}/configure
  - --prefix=${.:/component/deployment-directory}
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: subprocess
  command:
  - make
  - -j
  - ${.:/host-processor-count}
  enabled-by: true
  env:
  - action: set
    name: AM_UPDATE_INFO_DIR
    value: 'no'
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: subprocess
  command:
  - make
  - -j
  - ${.:/host-processor-count}
  - install
  - DESTDIR=${.:/params/build-directory}/destdir
  enabled-by: true
  env:
  - action: set
    name: AM_UPDATE_INFO_DIR
    value: 'no'
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: directory-state-discard-and-clear
  enabled-by: true
  output-name: .
- action: directory-state-move-tree
  enabled-by: true
  excludes: []
  output-name: .
  prefix: null
  root: ${.:/params/build-directory}/destdir/${.:/component/deployment-directory}
- action: subprocess
  command:
  - strip
  - -s
  - ${.:/glob-executables:*/bin/*}
  enabled-by: true
  env: []
  expected-return-code: null
  working-directory: ${.:/params/build-directory}
- action: remove-tree
  enabled-by: true
  missing-ok: true
  path: ${.:/params/build-directory}
copyrights:
- Copyright (C) 2023 embedded brains GmbH & Co. KG
copyrights-by-license: {}
directory: ${.:/component/deployment-directory}
directory-state-type: explicit
enabled-by:
- pkg.arch.riscv
- pkg.arch.sparc
files: []
hash: null
links:
- hash: null
  name: component
  role: input
  uid: ../component
- hash: null
  name: source
  role: input
  uid: ../source/sis
- hash: null
  name: member
  role: input-to
  uid: archive
params:
  build-directory: ${.:/component/build-directory}/build-sis
pkg-type: directory-state
type: pkg
