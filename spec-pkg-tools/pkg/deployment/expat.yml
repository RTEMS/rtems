actions:
- action: remove-tree
  enabled-by: true
  missing-ok: true
  path: ${.:/params/build-directory}
- action: mkdir
  enabled-by: true
  exist-ok: false
  parents: true
  path: ${.:/params/build-directory}
- action: subprocess
  command:
  - ${../source/expat:/directory}/configure
  - --prefix=${.:/component/deployment-directory}
  - --libdir=${.:/component/deployment-directory}/lib
  - --libexecdir=${.:/component/deployment-directory}/lib
  - --disable-shared
  - --verbose
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: subprocess
  command:
  - make
  - -j
  - ${.:/host-processor-count}
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: subprocess
  command:
  - make
  - -j
  - ${.:/host-processor-count}
  - install
  - DESTDIR=${.:/params/build-directory}/destdir
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/build-directory}
- action: directory-state-discard-and-clear
  enabled-by: true
  output-name: .
- action: directory-state-move-tree
  enabled-by: true
  excludes: []
  output-name: .
  prefix: null
  root: ${.:/params/build-directory}/destdir/${.:/component/deployment-directory}
- action: remove-tree
  enabled-by: true
  missing-ok: true
  path: ${.:/params/build-directory}
copyrights:
- Copyright (C) 2023 embedded brains GmbH & Co. KG
copyrights-by-license: {}
directory: ${.:/component/deployment-directory}
directory-state-type: explicit
enabled-by: true
files: []
hash: null
links:
- hash: null
  name: component
  role: input
  uid: ../component
- hash: null
  name: source
  role: input
  uid: ../source/expat
- hash: null
  name: member
  role: input-to
  uid: /pkg/deployment/archive
params:
  build-directory: ${.:/component/build-directory}/build-expat
pkg-type: directory-state
type: pkg
