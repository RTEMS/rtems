- enabled-by: true
  patch: "diff --git a/sis.info b/sis.info\nindex 89882c2a9..e2fda802d 100644\n--- a/sis.info\n+++ b/sis.info\n@@ -1,6 +1,6 @@\n-This is sis.info, produced by makeinfo version 6.8 from sis.texi.\n+This is sis.info, produced by makeinfo version 6.5 from sis.texi.\n\n-This manual is for SIS (version 2.30, 30 July 2021).\n+This manual is for SIS (version 2.30, 22 April 2026).\n\n    Copyright (C) 2020 Free Software Foundation, Inc.\n\n@@ -21,7 +21,7 @@ File: sis.info,  Node: Top,  Next: Introduction,  Up: (dir)\n SIS\n ***\n\n-This manual is for SIS (version 2.30, 30 July 2021).\n+This manual is for SIS (version 2.30, 22 April 2026).\n\n * Menu:\n\n@@ -82,32 +82,17 @@ The simulator is started as follows:\n\n    The following options are recognized:\n\n-'-bridge BRIDGE'\n-     Connect the tap device used for networking to the host BRIDGE.\n-     Typical values are br0 or lxcbr0.  Requires running SIS with\n-     sudo/root.\n-\n-'-c FILE'\n-     Read sis commands from FILE at startup.\n-\n-'-cov'\n-     Enable code coverage and write a coverage file at exit.\n-\n-'-d CLOCKS'\n-     Set the the number of CLOCKS in each time-slice for multi-processor\n-     simulation.  Default is 50, set lower for higher accuracy.\n+'-help'\n+     Display a help message\n\n '-erc32'\n      Emulate the SPARC V7 ERC32 processor\n\n-'-freq FREQ'\n-     Set frequency of emulated cpu.  This is used by the 'perf' command\n-     to calculated the MIPS figure for a particular configuration.  The\n-     frequency must be an integer indicating the frequency in MHz.\n+'-leon2'\n+     Emulate the SPARC V8 LEON2 processor\n\n-'-gdb'\n-     Start a gdb server, listening on port 1234.  An alternative port\n-     can be specified with -PORT NN.\n+'-leon3'\n+     Emulate the SPARC V8 LEON3 processor\n\n '-gr740'\n      Emulate a (limited) GR740 SOC device\n@@ -115,47 +100,99 @@ The simulator is started as follows:\n '-griscv'\n      Emulate a GRISCV (RISCV/GRLIB) SOC device\n\n-'-leon2'\n-     Emulate the SPARC V8 LEON2 processor\n-\n-'-leon3'\n-     Emulate the SPARC V8 LEON3 processor\n-\n-'-m CORES'\n-     Enable the number of CORES (2 - 4) in a leon3 or RISC-V\n-     multi-processor system.\n-\n-'-nfp'\n-     Disable the simulated FPU, so each FPU instruction will generate a\n-     FPU disabled trap.\n+'-rv32'\n+     Emulate a RISC-V RV32IMACFD processor with CLINT module.\n\n-'-port PORT'\n-     Use PORT for the gdb server.  Default is port 1234.\n+'-v'\n+     Increase the debug level with 1, to provide more diagnostic\n+     messages.  Can be added multiple times.\n\n '-r'\n      Start execution immediately without an interactive shell.  This is\n      useful for automated testing.\n\n+'-tlim VALUE UNIT'\n+     Used together with -R to limit the amount of simulated time that\n+     the simulator runs for before exiting.  The following units are\n+     recognized: US, MS and S.  To limit simulated time to 100 seconds,\n+     use: -TLIM 100 S.\n+\n+'-c FILE'\n+     Read sis commands from FILE at startup.\n+\n+'-gdb'\n+     Start a gdb server, listening on port 1234.  An alternative port\n+     can be specified with -PORT NN.\n+\n+'-port GDB_PORT'\n+     Use GDB_PORT for the gdb server.  Default is port 1234.\n+\n+'-cov'\n+     Enable code coverage and write a coverage file at exit.\n+\n+'-freq FREQ'\n+     Set frequency of emulated cpu.  This is used by the 'perf' command\n+     to calculate the MIPS figure for a particular configuration.  The\n+     frequency must be an integer indicating the frequency in MHz.\n+\n+'-d CLOCKS'\n+     Set the the number of CLOCKS in each time-slice for multi-processor\n+     simulation.  Default is 50, set lower for higher accuracy.\n+\n '-rt'\n      Real-time mode.  When enabled, the simulator tries to synchronize\n      the simulator time to the wall (host) time.  Useful for interactive\n      programs.  Enabled by default when networking is used.\n\n-'-rv32'\n-     Emulate a RISC-V RV32IMACFD processor with CLINT module.\n+'-extirq IRQ_NUM'\n+     Set the external IRQ that injects a hardware interrupt IRQ_NUM as\n+     soon as the simulated program starts executing.\n\n-'-tlim DELAY'\n-     Used together with -R to limit the amount of simulated time that\n-     the simulator runs for before exiting.  The following units are\n-     recognized: US, MS and S.  To limit simulated time to 100 seconds,\n-     use: -TLIM 100 S.\n+'-ift'\n+     Enable the trace of every instruction fetch.  Useful for debugging.\n+\n+'-nfp'\n+     Disable the simulated FPU, so each FPU instruction will generate an\n+     FPU disabled trap.\n+\n+'-bridge BRIDGE'\n+     Connect the tap device used for networking to the host BRIDGE.\n+     Typical values are br0 or lxcbr0.  Requires running SIS with\n+     sudo/root.\n+\n+'-m CORES'\n+     Enable the number of CORES (2 - 4) in a leon3 or RISC-V\n+     multi-processor system.\n\n '-uart1 DEVICE'\n-     Connect UART1 (console) of the simulator to DEVICE.  stdin/stout is\n+     Connect UART1 (console) of the simulator to DEVICE.  stdin/stdout\n+     is default.\n+\n+'-uart2 DEVICE'\n+     Connect UART2 (console) of the simulator to DEVICE.  Disabled by\n      default.\n-'-v'\n-     Increase the debug level with 1, to provide more diagnostic\n-     messages.  Can be added multiple times.\n+\n+'-nouartrx'\n+     When this option is set, it disables UART RX (receive).  It\n+     disables polling of keyboard input to be sent to the simulated UART\n+     port.\n+\n+'-dumbio'\n+     Switch to simpler I/O modes.  Useful for environments which do not\n+     support complex terminal features.\n+\n+'-wrp'\n+     Enable write protection in certain memory regions for the ERC32\n+     processor.\n+\n+'-rom8'\n+     When enabled, it treats the ROM as an 8-bit wide device for ERC32\n+     processors.  Useful when you want to simulate the timing and\n+     data-bus behavior of an 8-bit ROM.\n+\n+'-uben'\n+     Enable handling of unaligned memory accesses and specific\n+     byte-ordering behaviors for ERC32.\n\n 'file'\n      The executable file to be loaded must be an SPARC or RISCV ELF\n@@ -1421,22 +1458,17 @@ Index\n\n \x1f\n Tag Table:\n-Node: Top\x7f697\n-Node: Introduction\x7f1047\n-Node: Invoking sis\x7f1800\n-Node: Commands\x7f4360\n-Node: Emulated Systems\x7f8464\n-Node: Multi-processing\x7f23159\n-Node: Networking\x7f23647\n-Node: Interfacing to GDB\x7f29957\n-Node: Code coverage\x7f30361\n-Node: Building SIS\x7f31366\n-Node: GNU Free Documentation License\x7f32016\n-Node: Index\x7f57160\n+Node: Top\x7f698\n+Node: Introduction\x7f1049\n+Node: Invoking sis\x7f1802\n+Node: Commands\x7f5415\n+Node: Emulated Systems\x7f9519\n+Node: Multi-processing\x7f24214\n+Node: Networking\x7f24702\n+Node: Interfacing to GDB\x7f31012\n+Node: Code coverage\x7f31416\n+Node: Building SIS\x7f32421\n+Node: GNU Free Documentation License\x7f33071\n+Node: Index\x7f58215\n \x1f\n End Tag Table\n-\n-\x1f\n-Local Variables:\n-coding: utf-8\n-End:\ndiff --git a/version.texi b/version.texi\nindex 997e1abbb..d06e6337a 100644\n--- a/version.texi\n+++ b/version.texi\n@@ -1,4 +1,4 @@\n-@set UPDATED 30 July 2021\n-@set UPDATED-MONTH July 2021\n+@set UPDATED 22 April 2026\n+@set UPDATED-MONTH April 2026\n @set EDITION 2.30\n @set VERSION 2.30\n"
