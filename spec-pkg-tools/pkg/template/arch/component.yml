attribute-actions:
- action: set-default
  enabled-by: true
  path: /ident
  value: ${.:/component/name}/${.:/component/package-version}/${.:/arch}
- action: set-default
  enabled-by: true
  path: /binutils-install-excludes
  value: []
- action: set-default
  enabled-by: true
  path: /clang-target
  value: ${.:/arch}
- action: set-default
  enabled-by: true
  path: /gcc-install-excludes
  value:
  - /share/info/dir
- action: set-default
  enabled-by: true
  path: /gcc-reported-version
  value: 13.4.0
- action: set-default
  enabled-by: true
  path: /gcc-version
  value: 13.4.0
copyrights:
- Copyright (C) 2024 embedded brains GmbH & Co. KG
enabled-by: true
enabled-set-actions:
- action: add
  enabled-by: true
  value: ${.:/arch}
enabled-set-feedback-mapping:
  ${.:/arch}: pkg.arch.${.:/arch}
  pkg.feature.ada: pkg.feature.ada
  x86_64-w64: pkg.feature.x86_64-w64
links: []
pkg-type: template
template-type: component
type: pkg
