text: |
  The uncovered code blocks are related to
  ${/score/tq/req/deadlock-concurrent:/spec} and validation test case
  ${/score/tq/val/smp:/spec}. The specified scenario can happen on systems with
  two processors, however, the validation test case requires at least three
  processors (one processor is necessary to guide the test scenario).

  While the validation tests of pre-qualified ${/glossary/rtems:/term} do not
  reach this code, the randomized test in
  :file:`testsuites/smptests/smpmutex02/init.c` of the RTEMS test suites
  sporadically executes these lines and branches.
