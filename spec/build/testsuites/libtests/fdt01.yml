cppflags: []
do-build: |
  path = "testsuites/libtests/fdt01/"
  dts = []
  dts.append("bsps/aarch64/xilinx-zynqmp/fdt/zynqmp.dts")
  dts.append("bsps/riscv/riscv/dts/mpfs.dts")
  dts.append("bsps/microblaze/microblaze_fpga/dts/system.dts")
  objs = []
  for dts_file in dts:
    objs.append(self.dtc(bld, dts_file, path))
  gzip_objs = []
  for dtb_file in objs:
    gzip_objs.append(self.gzip(bld, dtb_file))
  objs.extend(gzip_objs)
  tar = path + "fdt01.tar"
  self.tar(bld, objs, [path], tar)
  tar_c, tar_h = self.bin2c(bld, tar)
  hdrs = [tar_h]
  hdrs.append("testsuites/libtests/fdt01/zynqmp-test-dtb.h")
  hdrs.append("testsuites/libtests/fdt01/mpfs-test-dtb.h")
  hdrs.append("testsuites/libtests/fdt01/microblaze-test-dtb.h")
  hdrs.append("cpukit/include/rtems/score/cpuopts.h")
  objs = []
  objs.append(self.cc(bld, bic, tar_c))
  objs.append(self.cc(bld, bic, path + "init.c", deps=hdrs, cppflags=bld.env.TEST_FDT01_CPPFLAGS))
  self.link_cc(bld, bic, objs, "testsuites/libtests/fdt01.exe")
do-configure: null
enabled-by:
- not: TEST_FDT01_EXCLUDE
includes:
- testsuites/libtests/fdt01
ldflags: []
links: []
prepare-build: null
prepare-configure: null
stlib: []
target: testsuites/libtests/fdt01.exe
type: build
use-after:
- z
use-before: []
