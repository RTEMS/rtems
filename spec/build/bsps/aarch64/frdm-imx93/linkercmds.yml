  BSP_RAM_BASE = 0x80000000;
  BSP_RAM_END = 0x96000000;

  BSP_RAM1_BASE = 0x98000000;
  BSP_RAM1_LENGTH = 0x68000000;

  BSP_IMX93_LOADOFFSET = 0x80200000;

  AARCH64_MMU_TT_PAGES_SIZE = 0x1000 * ${AARCH64_MMU_TRANSLATION_TABLE_PAGES};

  MEMORY {
  RAM_MMU  : ORIGIN = BSP_RAM_BASE, LENGTH = AARCH64_MMU_TT_PAGES_SIZE
  RAM      : ORIGIN = BSP_IMX93_LOADOFFSET, LENGTH = BSP_RAM_END - BSP_IMX93_LOADOFFSET
  RAM1     : ORIGIN = BSP_RAM1_BASE, LENGTH = BSP_RAM1_LENGTH
  NOCACHE  : ORIGIN = 0x80100000, LENGTH = 1M
  }

  REGION_ALIAS ("REGION_START",          RAM);
  REGION_ALIAS ("REGION_VECTOR",         RAM);
  REGION_ALIAS ("REGION_TEXT",           RAM);
  REGION_ALIAS ("REGION_TEXT_LOAD",      RAM);
  REGION_ALIAS ("REGION_RODATA",         RAM);
  REGION_ALIAS ("REGION_RODATA_LOAD",    RAM);
  REGION_ALIAS ("REGION_DATA",           RAM);
  REGION_ALIAS ("REGION_DATA_LOAD",      RAM);
  REGION_ALIAS ("REGION_FAST_TEXT",      RAM);
  REGION_ALIAS ("REGION_FAST_TEXT_LOAD", RAM);
  REGION_ALIAS ("REGION_FAST_DATA",      RAM);
  REGION_ALIAS ("REGION_FAST_DATA_LOAD", RAM);
  REGION_ALIAS ("REGION_BSS",            RAM);
  REGION_ALIAS ("REGION_WORK",           RAM);
  REGION_ALIAS ("REGION_STACK",          RAM);
  REGION_ALIAS ("REGION_NOCACHE",        NOCACHE);
  REGION_ALIAS ("REGION_NOCACHE_LOAD",   NOCACHE);

  bsp_stack_exception_size = DEFINED (bsp_stack_exception_size) ? bsp_stack_exception_size : 1024;

  bsp_section_rwbarrier_align = DEFINED (bsp_section_rwbarrier_align) ? bsp_section_rwbarrier_align : 1M;

  bsp_vector_table_in_start_section = 1;
  bsp_translation_table_base = ORIGIN (RAM_MMU);
  bsp_translation_table_end = ORIGIN (RAM_MMU) + LENGTH (RAM_MMU);

  OUTPUT_FORMAT ("elf64-littleaarch64")
  OUTPUT_ARCH (aarch64)

  INCLUDE linkcmds.base
copyrights:
  - Copyright (C) 2026 Rongjie Lee
enabled-by: true
install-path: ${BSP_LIBDIR}
links: []
target: linkcmds
type: build
