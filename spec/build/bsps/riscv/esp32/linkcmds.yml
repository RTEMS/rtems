build-type: config-file
content: |
  /*
   * Direct Boot Mode uses 8 bytes of signature and begins execution at flash
   * address 0x8 which corresponds to mapped instruction address 0x42000008
   */
  MEMORY {
    CODE_FLASH_MAPPED : ORIGIN = 0x42000000, LENGTH = ${ESP32C_CODE_REGION_SIZE}
    CODE_FLASH_RAW : ORIGIN = 0x0, LENGTH = ${ESP32C_CODE_REGION_SIZE}
    DATA_FLASH_MAPPED : ORIGIN = 0x3c000000 + ${ESP32C_CODE_REGION_SIZE}, LENGTH = ${ESP32C_FLASH_SIZE} - ${ESP32C_CODE_REGION_SIZE}
    DATA_FLASH_RAW : ORIGIN = 0x0 + ${ESP32C_CODE_REGION_SIZE}, LENGTH = ${ESP32C_FLASH_SIZE} - ${ESP32C_CODE_REGION_SIZE}
    RAM : ORIGIN = 0x3fc80000, LENGTH = 0x50000
  }

  REGION_ALIAS ("REGION_START", CODE_FLASH_MAPPED);
  REGION_ALIAS ("REGION_START_LOAD", CODE_FLASH_RAW);
  REGION_ALIAS ("REGION_TEXT", CODE_FLASH_MAPPED);
  REGION_ALIAS ("REGION_TEXT_LOAD", CODE_FLASH_RAW);
  REGION_ALIAS ("REGION_FAST_TEXT", CODE_FLASH_MAPPED);
  REGION_ALIAS ("REGION_FAST_TEXT_LOAD", CODE_FLASH_RAW);
  REGION_ALIAS ("REGION_RODATA", DATA_FLASH_MAPPED);
  REGION_ALIAS ("REGION_RODATA_LOAD", DATA_FLASH_RAW);
  REGION_ALIAS ("REGION_DATA", RAM);
  REGION_ALIAS ("REGION_DATA_LOAD", DATA_FLASH_RAW);
  REGION_ALIAS ("REGION_FAST_DATA", RAM);
  REGION_ALIAS ("REGION_FAST_DATA_LOAD", DATA_FLASH_RAW);
  REGION_ALIAS ("REGION_BSS", RAM);
  REGION_ALIAS ("REGION_RTEMSSTACK", RAM);
  REGION_ALIAS ("REGION_WORK", RAM);

  INCLUDE linkcmds.base
