default:
- enabled-by: true
  value:
  - -ffunction-sections
  - -fdata-sections
description: |
  Section layout flags required for correct linker garbage collection.
  These flags are separated from OPTIMIZATION_FLAGS so that users may
  override optimization settings without removing the required section
  flags.
  Users may override these flags through the SECTION_FLAGS build option
  if different section handling behaviour is required.
enabled-by: true
