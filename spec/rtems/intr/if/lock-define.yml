brief: |
  Defines an ISR lock object.
copyrights:
- Copyright (C) 2021, 2024 embedded brains GmbH & Co. KG
- Copyright (C) 1988, 2008 On-Line Applications Research Corporation (OAR)
definition:
  default:
    attributes: null
    body: null
    params:
    - ${.:/params[0]/name}
    - ${.:/params[1]/name}
    - const char *${.:/params[2]/name}
    return: null
  variants:
  - definition:
      attributes: null
      body: |
        ${.:/params[0]/name} ${lock:/name} ${.:/params[1]/name} = ${/score/isr/if/lock-initializer:/name}( ${.:/params[2]/name} );
      params:
      - ${.:/params[0]/name}
      - ${.:/params[1]/name}
      - const char *${.:/params[2]/name}
      return: null
    enabled-by: ${/score/isr/if/lock-needs-object:/name}
description: null
enabled-by: true
index-entries: []
interface-type: macro
links:
- role: interface-placement
  uid: header
- role: interface-ingroup
  uid: group
name: RTEMS_INTERRUPT_LOCK_DEFINE
notes: |
  Do not add a ";" after this macro.

  ISR locks may also be dynamically initialized by ${lock-initialize:/name} or
  statically by ${lock-initializer:/name}.
params:
- description: |
    is the storage-class specifier for the ISR lock to declare, for example `extern`
    or `static`.
  dir: null
  name: _specifier
- description: |
    is the ISR lock object designator.
  dir: null
  name: _designator
- description: |
    is the ISR lock name.  It shall be a string.  The name is only used where
    the system was built with profiling support enabled.
  dir: null
  name: _name
return: null
type: interface
