brief: |
  Gets the seconds elapsed since the ${/glossary/rtems-epoch:/term} and the
  current ${/glossary/clock-realtime:/term}.
copyrights:
- Copyright (C) 2021 embedded brains GmbH (http://www.embedded-brains.de)
