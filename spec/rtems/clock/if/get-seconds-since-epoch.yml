definition:
  default:
    attributes: null
    body: null
    params:
    - ${../../type/if/interval:/name} *${.:/params[0]/name}
    return: ${../../status/if/code:/name}
  variants: []
description: null
enabled-by: true
index-entries: []
interface-type: function
links:
- role: interface-placement
  uid: header
- role: interface-ingroup
  uid: group
- role: constraint
  uid: /constraint/directive-not-pre-qualified
- role: constraint
  uid: /constraint/directive-ctx-any
- role: constraint
  uid: /constraint/directive-no-preempt
- role: constraint
  uid: /constraint/clock-driver
name: rtems_clock_get_seconds_since_epoch
notes: null
params:
- description: |
    is the pointer to an ${../../type/if/interval:/name} object.  When the
    directive call is successful, the seconds elapsed since the
    ${/glossary/rtems-epoch:/term} and the ${/glossary/clock-realtime:/term}
    at some point during the directive call will be stored in this object.
  dir: out
  name: seconds_since_rtems_epoch
return:
  return: null
  return-values:
  - description: |
      The requested operation was successful.
    value: ${../../status/if/successful:/name}
  - description: |
      The ${.:/params[0]/name} parameter was ${/c/if/null:/name}.
    value: ${../../status/if/invalid-address:/name}
  - description: |
      The ${/glossary/clock-realtime:/term} was not set.  It can be set with
      ${set:/name}.
    value: ${../../status/if/not-defined:/name}
type: interface
